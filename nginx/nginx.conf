# Nginx API 网关配置
# 统一入口: http://localhost:8000

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # 日志
    access_log logs/access.log;
    error_log logs/error.log;

    # 上传文件大小限制
    client_max_body_size 100M;

    # 超时设置
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
    proxy_read_timeout 300;

    # 上游服务定义
    upstream business_service {
        server localhost:8001;
    }

    upstream inference_service {
        server localhost:8002;
    }

    # API 网关服务器
    server {
        listen 8000;
        server_name localhost;

        # CORS 配置
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        # OPTIONS 请求处理
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # 健康检查
        location /health {
            return 200 '{"status":"healthy","gateway":"nginx"}';
            add_header Content-Type application/json;
        }

        # ==================== 系统管理接口 ====================
        # 模型管理 -> 业务服务
        location /system/models {
            proxy_pass http://business_service/models;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 图片数据库 -> 业务服务
        location /system/images {
            proxy_pass http://business_service/images;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 任务管理 -> 业务服务
        location /system/tasks {
            proxy_pass http://business_service/tasks;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ==================== 推理接口 ====================
        # 所有推理请求 -> 推理服务
        location /system/inference {
            proxy_pass http://inference_service/inference;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 大文件上传
            client_body_buffer_size 128k;
            client_max_body_size 100M;
        }

        # ==================== 静态文件服务 ====================
        # 上传的图片和结果
        location /uploads {
            alias G:/ShuangChuang/ShuangC/backend/uploads;
            autoindex on;
            add_header Cache-Control "public, max-age=3600";
        }

        # ==================== 默认路由 ====================
        location / {
            return 200 '{"message":"API Gateway is running","version":"1.0.0"}';
            add_header Content-Type application/json;
        }
    }
}
